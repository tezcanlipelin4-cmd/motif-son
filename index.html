<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTİF ATLASI</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Slab:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══ HERO ══ -->
<div id="hero" class="page active" onclick="showPanoramic()" style="cursor:pointer">
  <img src="assets/images/hero.jpg" alt="MOTİF ATLASI">
  <div id="hero-hint"></div>
</div>

<!-- ══ PANORAMİK ══ -->
<div id="pano" class="page" style="display:none">
  <nav id="topNav">
    <button onclick="showOverlay('kadin')">Kadinlar</button>
    <button onclick="showOverlay('kadin')">Anadolu</button>
    <button onclick="showOverlay('motif')">Dokuma</button>
  </nav>

  <div id="panoScroller">
    <div id="panoScene">

      <!-- Katman 1: Arka Plan (en yavaş, 0.25x) -->
      <img id="layer-bg" class="layer"
           src="assets/images/arkaplan.png" draggable="false" alt="">

      <img id="layer-kuzu" class="layer"
           src="assets/images/kuzu.png"
           draggable="false" alt="">
      <img id="layer-koc" class="layer"
           src="assets/images/koc.png"
           draggable="false" alt="">

      <!-- Katman 2: Nesneler (orta hız, 0.6x) -->
      <img id="layer-ns" class="layer"
           src="assets/images/obje.png" draggable="false" alt="">

      <!-- Kadınlar (tam hız, 1.0x) -->
      <img id="layer-k1" class="layer woman clickable" onclick="showOverlay('yasam')"
           src="assets/images/kadin1.png" draggable="false" alt="">

      <img id="layer-k2" class="layer clickable"
           src="assets/images/kadin2.png" draggable="false" alt="Bereket"
           onclick="showOverlay('bereket')">

      <img id="layer-k3" class="layer woman clickable" onclick="showOverlay('akis')"
           src="assets/images/kadin3.png" draggable="false" alt="">

      <img id="layer-k4" class="layer woman clickable" onclick="showOverlay('guc')"
           src="assets/images/kadin4.png" draggable="false" alt="">

      <img id="layer-k5" class="layer clickable"
           src="assets/images/kadin5.png" draggable="false" alt="Nazar"
           onclick="showOverlay('nazar')">

      <!-- ══ Kadın hotspot tıklama alanları ══ -->
      <div class="woman-hotspot" style="left:21%;width:13%;"
           onmouseenter="womanHover(0,true)" onmouseleave="womanHover(0,false)"
           onclick="womanClick(event,0,'yasam')"></div>
      <div class="woman-hotspot" style="left:36%;width:11%;"
           onmouseenter="womanHover(1,true)" onmouseleave="womanHover(1,false)"
           onclick="womanClick(event,1,'bereket')"></div>
      <div class="woman-hotspot" style="left:46%;width:14%;"
           onmouseenter="womanHover(2,true)" onmouseleave="womanHover(2,false)"
           onclick="womanClick(event,2,'akis')"></div>
      <div class="woman-hotspot" style="left:57%;width:16%;"
           onmouseenter="womanHover(3,true)" onmouseleave="womanHover(3,false)"
           onclick="womanClick(event,3,'guc')"></div>
      <div class="woman-hotspot" style="left:69%;width:24%;"
           onmouseenter="womanHover(4,true)" onmouseleave="womanHover(4,false)"
           onclick="womanClick(event,4,'nazar')"></div>

    </div>
  </div>

  <!-- Uçan kuş -->
  <div id="bird"></div>

  <div id="scrollIndicator">
    <span>KAYDİR</span><span class="arr">→</span>
  </div>
</div>

<!-- ══ BEREKET ══ -->
<div id="bereket" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('bereket')">✕</button>
  <div class="overlay-content">
    <img src="assets/images/overlay-yasam.jpg" alt="BEREKET">
  </div>
</div>

<!-- ══ NAZAR ══ -->
<div id="nazar" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('nazar')">✕</button>
  <div class="overlay-content">
    <img src="assets/images/overlay-bereket.jpg" alt="NAZAR">
  </div>
</div>

<!-- ══ DOKUMA ══ -->
<div id="motif" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('motif')">✕</button>
  <div class="overlay-content" style="background:#87CEEB;align-items:center;justify-content:center;padding:0;min-height:100vh;">
    <img src="assets/images/dokuma-gorsel.png" alt="DOKUMA"
         style="width:100%;height:100vh;object-fit:cover;display:block;">
  </div>
</div>

<script src="js/script.js"></script>

<div id="yasam" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('yasam')">✕</button>
  <div class="overlay-content">
    <img src="assets/images/overlay-guc.jpg" alt="YAŞAM" style="width:100%;display:block;">
  </div>
</div>
<div id="akis" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('akis')">✕</button>
  <div class="overlay-content">
    <img src="assets/images/overlay-nazar.jpg" alt="AKIŞ" style="width:100%;display:block;">
  </div>
</div>
<div id="guc" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('guc')">✕</button>
  <div class="overlay-content">
    <img src="assets/images/overlay-akis.jpg" alt="GÜÇ" style="width:100%;display:block;">
  </div>
</div>
<div id="kadin" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('kadin')">✕</button>
  <div class="overlay-content" style="background:#00155c;align-items:center;justify-content:center;padding:0;">
    <video id="kadinVideo" autoplay muted loop playsinline
           style="width:100%;max-height:100vh;object-fit:contain;display:block;">
      <source src="assets/videos/video-kadin.mp4" type="video/mp4">
    </video>
  </div>
</div>
</body>
</html>
